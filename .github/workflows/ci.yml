name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install .NET Aspire Workload
      run: dotnet workload install aspire

    - name: Restore dependencies
      run: dotnet restore autogestor.sln

    - name: Build Solution
      run: dotnet build autogestor.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test autogestor.sln --configuration Release --no-build
